services:
  app:
    image: node:24.14.1-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4321:4321"
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0
      "

  format:
    image: node:24.14.1-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npm run format
